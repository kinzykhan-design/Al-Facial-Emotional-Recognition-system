<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI  Facial Emotion Recognition System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #020617;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

       
        .bg-image {
            position: absolute;
            inset: 0;
            
            background: url('assets/images/AI-cybersecurity-lock login-image.jpg'); 
            background-size: cover;
            background-position: center;
            filter: brightness(0.3) blur(4px); 
            z-index: -1;
            transform: scale(1.1); /* Zoom effect for better fit */
        }

        .auth-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(34, 211, 238, 0.3);
            padding: 45px;
            border-radius: 35px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.9);
        }

        .auth-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px;
            border-radius: 12px;
            color: #22d3ee;
            margin-top: 8px;
            outline: none;
        }

        .action-btn {
            width: 100%;
            background: linear-gradient(90deg, #06b6d4, #7c3aed);
            color: white;
            font-weight: 900;
            padding: 16px;
            border-radius: 12px;
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
        }

        .action-btn:hover {
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.4);
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="auth-card">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 uppercase tracking-tighter">System Access</h2>
            <p class="text-gray-400 text-[9px] font-bold tracking-[0.4em] mt-2">IDENTIFY VERIFICATION</p>
        </div>
        
        <form action="analyzer.html">
            <div class="mb-4">
                <label class="text-[9px] font-black text-cyan-400 uppercase ml-2">Operator Identity</label>
                <input type="email" placeholder="laraib.res@lab.ai" class="auth-input" required>
            </div>
            <div class="mb-6">
                <label class="text-[9px] font-black text-cyan-400 uppercase ml-2">Access Code</label>
                <input type="password" placeholder="••••••••" class="auth-input" required>
            </div>
            <button type="submit" class="action-btn">Authenticate</button>
        </form>
        <div class="mt-8 text-center text-[10px] text-gray-500 font-bold uppercase tracking-widest">
            New Here? <a href="signup.html" class="text-cyan-400 hover:underline">Register Identity</a>
        </div>
    </div>
</body>
</html>
