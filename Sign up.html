<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up| AI Facial Emotion Recognition System </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #020617;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Image Setup */
        .bg-image {
            position: absolute;
            inset: 0;
            /* Yahan apni image ka path lagayein */
            background: url('assets/images/AI-cybersecurity-lock login-image.jpg'); 
            background-size: cover;
            background-position: center;
            filter: brightness(0.3) blur(5px);
            z-index: -1;
            transform: scale(1.1);
        }

        .auth-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(34, 211, 238, 0.3);
            padding: 40px;
            border-radius: 35px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.9);
        }

        .auth-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 10px;
            color: #22d3ee;
            margin-top: 5px;
            outline: none;
            transition: 0.3s;
        }

        .auth-input:focus {
            border-color: #22d3ee;
            background: rgba(34, 211, 238, 0.1);
        }

        .action-btn {
            width: 100%;
            background: linear-gradient(90deg, #7c3aed, #06b6d4);
            color: white;
            font-weight: 900;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            border: none;
            cursor: pointer;
        }

        .action-btn:hover {
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="auth-card">
        <div class="text-center mb-6">
            <h2 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-400 uppercase tracking-tighter">Initialize Researcher</h2>
            <p class="text-gray-400 text-[9px] font-bold tracking-[0.4em] mt-2">NEW OPERATOR REGISTRATION</p>
        </div>
        
        <form>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="text-[9px] font-black text-cyan-400 uppercase ml-2">First Name</label>
                    <input type="text" placeholder="Laraib" class="auth-input" required>
                </div>
                <div>
                    <label class="text-[9px] font-black text-cyan-400 uppercase ml-2">Last Name</label>
                    <input type="text" placeholder="Res" class="auth-input" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="text-[9px] font-black text-cyan-400 uppercase ml-2">Operator Email</label>
                <input type="email" placeholder="operator@lab.ai" class="auth-input" required>
            </div>
            
            <div class="mb-6">
                <label class="text-[9px] font-black text-cyan-400 uppercase ml-2">Create Access Code</label>
                <input type="password" placeholder="••••••••" class="auth-input" required>
            </div>
            
            <button type="submit" class="action-btn">Create Identity</button>
        </form>
        
        <div class="mt-6 text-center text-[10px] text-gray-500 font-bold uppercase tracking-widest">
            Authorized Already? <a href="login.html" class="text-purple-400 hover:underline">ACCESS TERMINAL</a>
        </div>
    </div>
</body>
</html>
